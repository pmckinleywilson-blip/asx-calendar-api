name: ASX Event Detection Pipeline

on:
  # Every 4 hours during AU market hours (6am–10pm AEST, UTC+10).
  # Frequent runs ensure we catch announcements before 5+ filings push them
  # past the Markit API's 5-item cap.
  schedule:
    - cron: '17 20 * * 1-5'   #  6:17am AEST weekdays (pre-market)
    - cron: '17 0 * * 1-5'    # 10:17am AEST
    - cron: '17 4 * * 1-5'    #  2:17pm AEST
    - cron: '17 8 * * 1-5'    #  6:17pm AEST
    - cron: '17 12 * * 1-5'   # 10:17pm AEST (post-market catch-up)

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      tier:
        description: 'Company tier to scan (asx100, asx101-300, asx301-500, or auto)'
        required: false
        default: 'auto'

permissions:
  contents: write

jobs:
  detect-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run event detection pipeline
        run: node scripts/pipeline.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          INVITE_FROM_EMAIL: ${{ secrets.INVITE_FROM_EMAIL }}

  # Daily digest email — 7am AEST (20:17 UTC prior day) on weekdays
  daily-digest:
    runs-on: ubuntu-latest
    if: github.event.schedule == '17 20 * * 1-5' && github.event_name == 'schedule'
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Send daily digest
        run: node scripts/daily-digest.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          INVITE_FROM_EMAIL: ${{ secrets.INVITE_FROM_EMAIL }}

  # Weekly company data refresh (Monday pre-market only)
  update-companies:
    runs-on: ubuntu-latest
    if: github.event.schedule == '17 20 * * 1-5' && github.event_name == 'schedule'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update company data
        run: node scripts/update-companies.js

      - name: Commit updated company data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/asx-companies.csv
          git diff --staged --quiet || git commit -m "chore: update ASX company data [automated]"
          git push
